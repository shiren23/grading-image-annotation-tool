<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标注结果查看工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航栏 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .folder-select-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .folder-select-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .stats-info {
            font-size: 14px;
            opacity: 0.9;
        }

        .total-badge {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.9);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .total-badge .total-num {
            color: #ffb3b3;
            font-weight: 700;
            font-size: 15px;
        }

        /* 主体区域 */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
            padding: 40px;
            width: 100%;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h2 {
            font-size: 20px;
            color: #666;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 14px;
            color: #999;
            margin-bottom: 24px;
            line-height: 1.8;
        }

        .empty-state .folder-select-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        /* 左侧任务列表 */
        .task-list {
            width: 280px;
            background: white;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .task-list-header {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            background: #fafbfc;
        }

        .task-list-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .task-list-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .task-count {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .task-list-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .task-item {
            padding: 12px 14px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .task-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .task-item.active {
            border-color: #667eea;
            background: #f0f2ff;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
        }

        .task-id {
            font-family: monospace;
            font-size: 12px;
            color: #667eea;
            font-weight: 500;
            word-break: break-all;
            margin-bottom: 4px;
        }

        .task-meta {
            font-size: 11px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-status {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #e0e0e0;
        }

        .task-status.has-info {
            background: #27ae60;
        }

        /* 中间图片区域 */
        .image-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e8e8e8;
            overflow: hidden;
        }

        .image-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            padding: 20px;
        }

        .image-wrapper.fit-width {
            align-items: flex-start;
            justify-content: flex-start;
        }

        .image-box {
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            border-radius: 4px;
            overflow: hidden;
            background: white;
            max-width: 100%;
        }

        .image-box.fit-width {
            width: 100%;
            max-width: none;
            border-radius: 0;
        }

        .image-box img {
            display: block;
            max-width: 100%;
            max-height: calc(100vh - 100px);
            object-fit: contain;
        }

        .image-box.fit-width img {
            width: 100%;
            height: auto;
            max-height: none;
        }

        .image-nav {
            position: fixed;
            right: 0;
            bottom: 20px;
            transform: translateX(0);
            background: white;
            border-radius: 8px 0 0 8px;
            box-shadow: -2px 0 12px rgba(0,0,0,0.08);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 10;
        }

        .image-nav-btn {
            width: 48px;
            height: 48px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .image-nav-btn:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .image-nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 右侧信息面板 */
        .info-panel {
            width: 320px;
            background: white;
            border-left: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .info-panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            background: #fafbfc;
        }

        .info-panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-panel-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .info-panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .info-section {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .info-section-title {
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
        }

        .info-label {
            color: #888;
            flex-shrink: 0;
        }

        .info-value {
            color: #333;
            font-weight: 500;
            text-align: right;
            word-break: break-all;
        }

        .info-value.task-id-value {
            font-family: monospace;
            font-size: 12px;
            background: #f5f7ff;
            padding: 8px 12px;
            border-radius: 6px;
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .copy-btn {
            padding: 4px 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            opacity: 0.9;
        }

        .copy-btn.copied {
            background: #27ae60;
        }

        .info-text-block {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 14px;
            font-size: 13px;
            line-height: 1.7;
            color: #555;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }

        .reason-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .reason-tag {
            padding: 4px 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .reason-tag.empty {
            background: #e0e0e0;
            color: #999;
        }

        .badcase-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            font-size: 16px;
            font-weight: 700;
        }

        .badcase-badge.zero {
            background: #95a5a6;
        }

        /* 缩略图预览 */
        .thumb-preview {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            background: #f0f0f0;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumb-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* 隐藏文件输入 */
        #folderInput {
            display: none;
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 2000;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 14px;
        }

        /* 提示信息 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }
    </style>
</head>
<body>
    <input type="file" id="folderInput" webkitdirectory directory multiple>

    <!-- 顶部导航 -->
    <div class="header">
        <h1>📂 标注结果查看工具</h1>
        <div class="header-controls">
            <span class="total-badge" id="totalBadcaseInfo" style="display:none;"></span>
            <span class="stats-info" id="statsInfo">请选择标注结果文件夹</span>
            <button class="folder-select-btn" onclick="selectFolder()">📁 选择文件夹</button>
        </div>
    </div>

    <!-- 主体区域 -->
    <div class="main-container" id="mainContainer">
        <!-- 空状态 -->
        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">📂</div>
            <h2>欢迎使用标注结果查看工具</h2>
            <p>请选择一个由「图片批阅标注工具」导出的结果文件夹<br>文件夹结构示例：批阅标注结果_xxx / 任务编号 / (marked_图片 + error_info.txt)</p>
            <button class="folder-select-btn" onclick="selectFolder()">选择标注结果文件夹</button>
        </div>

        <!-- 工作区 -->
        <div class="task-list" id="taskList" style="display:none;">
            <div class="task-list-header">
                <div class="task-list-title">任务列表</div>
                <div class="task-count" id="taskCount">0 个任务</div>
            </div>
            <div class="task-list-body" id="taskListBody">
                <!-- 动态生成 -->
            </div>
        </div>

        <div class="image-area" id="imageArea" style="display:none;">
            <div class="image-wrapper" id="imageWrapper">
                <div class="image-box" id="imageBox">
                    <img id="previewImage" src="" alt="带批注图片" draggable="false">
                </div>
            </div>
        </div>

        <div class="info-panel" id="infoPanel" style="display:none;">
            <div class="info-panel-header">
                <div class="info-panel-title">任务详情</div>
            </div>
            <div class="info-panel-body" id="infoPanelBody">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 右侧浮动导航 -->
    <div class="image-nav" id="imageNav" style="display:none;">
        <button class="image-nav-btn" onclick="prevTask()" id="prevBtn" title="上一张">↑</button>
        <button class="image-nav-btn" onclick="toggleZoom()" id="zoomBtn" title="切换视图">🔍</button>
        <button class="image-nav-btn" onclick="nextTask()" id="nextBtn" title="下一张">↓</button>
    </div>

    <!-- 提示信息 -->
    <div class="toast" id="toast"></div>

    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">正在加载...</div>
    </div>

    <script>
        // ============ 全局状态 ============
        let resultItems = [];    // 所有结果项 [{taskId, folderName, imageFile, imageUrl, errorInfo}]
        let currentIndex = 0;
        let zoomMode = 'fit-height'; // 'fit-height' | 'fit-width'

        // ============ DOM 元素 ============
        const folderInput = document.getElementById('folderInput');
        const img = document.getElementById('previewImage');

        // ============ 文件夹选择 ============
        function selectFolder() {
            folderInput.click();
        }

        folderInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            showLoading('正在扫描结果文件夹...');

            try {
                await parseResultFolder(files);
                if (resultItems.length === 0) {
                    showToast('未找到有效的标注结果，请检查文件夹结构');
                    hideLoading();
                    return;
                }

                initUI();
                loadTask(0);
                hideLoading();
                showToast(`已加载 ${resultItems.length} 个任务结果`);
            } catch (err) {
                console.error(err);
                showToast('加载失败: ' + err.message);
                hideLoading();
            }

            folderInput.value = '';
        });

        // ============ 解析结果文件夹 ============
        async function parseResultFolder(files) {
            resultItems = [];

            // 按路径分组
            const dirMap = {};
            for (const file of files) {
                const parts = file.webkitRelativePath.split('/');
                // parts[0] = 根文件夹名 (如 "批阅标注结果_2026...")
                // parts[1] = 任务编号文件夹
                // parts[2] = 文件
                if (parts.length < 3) continue;

                const taskFolder = parts[1];
                const fileName = parts[parts.length - 1];

                if (!dirMap[taskFolder]) {
                    dirMap[taskFolder] = { files: [], folderName: taskFolder };
                }
                dirMap[taskFolder].files.push(file);
            }

            // 处理每个任务文件夹
            for (const key in dirMap) {
                const dir = dirMap[key];
                
                // 查找图片文件（marked_ 开头）
                const imageFile = dir.files.find(f => 
                    f.name.startsWith('marked_') && isImageFile(f.name)
                );
                
                // 查找 error_info.txt
                const errorInfoFile = dir.files.find(f => f.name === 'error_info.txt');
                
                // 查找 task_id.txt
                const taskIdFile = dir.files.find(f => f.name === 'task_id.txt');

                if (!imageFile) continue;

                // 读取 error_info.txt
                let errorInfo = {};
                if (errorInfoFile) {
                    const text = await readFileAsText(errorInfoFile);
                    errorInfo = parseErrorInfo(text);
                }

                // 读取 task_id.txt（如果 error_info 中没有 taskId）
                let taskId = errorInfo.taskId || key;
                if (taskIdFile && !errorInfo.taskId) {
                    taskId = (await readFileAsText(taskIdFile)).trim();
                }

                const imageUrl = URL.createObjectURL(imageFile);

                resultItems.push({
                    taskId,
                    folderName: dir.folderName,
                    imageFile,
                    imageUrl,
                    imageName: imageFile.name,
                    errorInfo
                });
            }

            // 保持原始顺序
        }

        function isImageFile(name) {
            const ext = name.toLowerCase();
            return ext.endsWith('.jpg') || ext.endsWith('.jpeg') || ext.endsWith('.png') || ext.endsWith('.gif') || ext.endsWith('.webp') || ext.endsWith('.bmp');
        }

        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsText(file);
            });
        }

        function parseErrorInfo(text) {
            const info = {};
            const lines = text.split('\n');
            
            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed || trimmed.startsWith('---')) continue;
                
                const colonIndex = trimmed.indexOf(':');
                if (colonIndex > 0) {
                    const key = trimmed.substring(0, colonIndex).trim();
                    const value = trimmed.substring(colonIndex + 1).trim();
                    
                    switch(key) {
                        case '任务编号': info.taskId = value; break;
                        case '文件夹': info.folderPath = value; break;
                        case '图片名称': info.imageName = value; break;
                        case '标注时间': info.timestamp = value; break;
                        case 'Badcase 数量': info.badcaseCount = parseInt(value) || 0; break;
                        case '错误原因': info.reasons = value.split(',').map(r => r.trim()).filter(r => r); break;
                        case '是否有勾画痕迹': info.hasDrawing = value === '是'; break;
                    }
                }
            }
            
            // 如果没有解析到 reasons，尝试从文本中查找
            if (!info.reasons || info.reasons.length === 0) {
                const reasonMatch = text.match(/错误原因:\s*(.+)/);
                if (reasonMatch) {
                    info.reasons = reasonMatch[1].split(',').map(r => r.trim()).filter(r => r);
                }
            }
            
            return info;
        }

        // ============ UI 初始化 ============
        function initUI() {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('taskList').style.display = 'flex';
            document.getElementById('imageArea').style.display = 'flex';
            document.getElementById('infoPanel').style.display = 'flex';
            document.getElementById('imageNav').style.display = 'flex';
            renderTaskList();
            updateTotalBadcase();
        }

        // ============ 统计 Badcase 总数 ============
        function updateTotalBadcase() {
            let total = 0;
            let tasksWithBadcase = 0;
            for (const item of resultItems) {
                const c = parseInt(item.errorInfo.badcaseCount) || 0;
                total += c;
                if (c > 0) tasksWithBadcase++;
            }
            const el = document.getElementById('totalBadcaseInfo');
            el.innerHTML = `共 <span class="total-num">${total}</span> 个 Badcase · ${tasksWithBadcase} 个任务`;
            el.style.display = 'inline-flex';
        }

        // ============ 渲染任务列表 ============
        function renderTaskList() {
            const body = document.getElementById('taskListBody');
            body.innerHTML = '';
            
            document.getElementById('taskCount').textContent = `${resultItems.length} 个任务`;

            resultItems.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'task-item' + (i === 0 ? ' active' : '');
                div.onclick = () => loadTask(i);
                
                const hasInfo = item.errorInfo.badcaseCount > 0 || (item.errorInfo.reasons && item.errorInfo.reasons.length > 0);
                
                div.innerHTML = `
                    <div class="task-id">${item.taskId}</div>
                    <div class="task-meta">
                        <span>${item.imageName}</span>
                        <span class="task-status ${hasInfo ? 'has-info' : ''}"></span>
                    </div>
                `;
                body.appendChild(div);
            });
        }

        function updateTaskListActive(index) {
            document.querySelectorAll('.task-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
            // 滚动到可见区域
            const activeEl = document.querySelectorAll('.task-item')[index];
            if (activeEl) {
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // ============ 加载任务 ============
        function loadTask(index) {
            if (index < 0 || index >= resultItems.length) return;

            currentIndex = index;
            const item = resultItems[index];

            // 更新统计
            document.getElementById('statsInfo').textContent = `结果 ${index + 1} / ${resultItems.length}`;

            // 加载图片
            img.src = item.imageUrl;

            // 更新导航按钮
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === resultItems.length - 1;

            // 更新任务列表高亮
            updateTaskListActive(index);

            // 更新信息面板
            renderInfoPanel(item);
        }

        // ============ 渲染信息面板 ============
        function renderInfoPanel(item) {
            const body = document.getElementById('infoPanelBody');
            const info = item.errorInfo;
            
            const reasonsHtml = info.reasons && info.reasons.length > 0
                ? info.reasons.map(r => `<span class="reason-tag">${r}</span>`).join('')
                : '<span class="reason-tag empty">无</span>';

            const badcaseClass = info.badcaseCount > 0 ? '' : 'zero';
            
            body.innerHTML = `
                <div class="info-section">
                    <div class="info-section-title">任务编号</div>
                    <div class="info-value task-id-value">
                        <span>${item.taskId}</span>
                        <button class="copy-btn" onclick="copyTaskId(this, '${item.taskId}')">复制</button>
                    </div>
                </div>
                
                <div class="info-section">
                    <div class="info-section-title">Badcase 数量</div>
                    <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
                        <span class="badcase-badge ${badcaseClass}">${info.badcaseCount || 0}</span>
                        <span style="font-size:13px;color:#888;">个</span>
                    </div>
                </div>
                
                <div class="info-section">
                    <div class="info-section-title">错误原因</div>
                    <div class="reason-tags" style="margin-top:8px;">
                        ${reasonsHtml}
                    </div>
                </div>
                
                <div class="info-section">
                    <div class="info-section-title">详细信息</div>
                    <div class="info-row">
                        <span class="info-label">文件夹</span>
                        <span class="info-value">${info.folderPath || '-'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">图片名称</span>
                        <span class="info-value">${info.imageName || item.imageName}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">勾画痕迹</span>
                        <span class="info-value">${info.hasDrawing ? '✓ 有' : '✗ 无'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">标注时间</span>
                        <span class="info-value">${info.timestamp || '-'}</span>
                    </div>
                </div>
                
                <div class="info-section">
                    <div class="info-section-title">原始报告</div>
                    <div class="info-text-block" id="rawReport">${item.errorInfo._raw || '无详细报告'}</div>
                </div>
            `;
        }

        // ============ 复制任务ID ============
        function copyTaskId(btn, taskId) {
            navigator.clipboard.writeText(taskId).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '✓ 已复制';
                btn.classList.add('copied');
                showToast('任务ID已复制到剪贴板');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 1500);
            }).catch(() => {
                // 降级方案
                const originalText = btn.textContent;
                const textarea = document.createElement('textarea');
                textarea.value = taskId;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = '✓ 已复制';
                btn.classList.add('copied');
                showToast('任务ID已复制到剪贴板');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 1500);
            });
        }

        // ============ 导航 ============
        function prevTask() {
            if (currentIndex > 0) loadTask(currentIndex - 1);
        }

        function nextTask() {
            if (currentIndex < resultItems.length - 1) loadTask(currentIndex + 1);
        }

        // ============ 缩放 ============
        function toggleZoom() {
            zoomMode = zoomMode === 'fit-height' ? 'fit-width' : 'fit-height';
            applyZoom();
        }

        function applyZoom() {
            const box = document.getElementById('imageBox');
            const wrapper = document.getElementById('imageWrapper');
            
            if (zoomMode === 'fit-width') {
                box.classList.add('fit-width');
                wrapper.classList.add('fit-width');
            } else {
                box.classList.remove('fit-width');
                wrapper.classList.remove('fit-width');
            }
        }

        // ============ 提示 ============
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        // ============ 键盘快捷键 ============
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': prevTask(); break;
                case 'ArrowDown': nextTask(); break;
                case 'ArrowLeft': prevTask(); break;
                case 'ArrowRight': nextTask(); break;
            }
        });
    </script>
</body>
</html>
