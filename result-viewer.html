<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标注结果查看工具</title>
    <script src="taxonomy.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航栏 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-shrink: 0;
            position: relative;
            z-index: 100;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .folder-select-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .folder-select-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .stats-info {
            font-size: 14px;
            opacity: 0.9;
        }

        .total-badge {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: rgba(255,255,255,0.9);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .total-badge .total-num {
            color: #ffb3b3;
            font-weight: 700;
            font-size: 15px;
        }

        /* 主体区域 */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
            padding: 40px;
            width: 100%;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h2 {
            font-size: 20px;
            color: #666;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 14px;
            color: #999;
            margin-bottom: 24px;
            line-height: 1.8;
        }

        .empty-state .folder-select-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        /* 左侧任务列表 */
        .task-list {
            width: 280px;
            background: white;
            border-right: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .task-list-header {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            background: #fafbfc;
        }

        .task-list-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .task-list-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .task-count {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .task-list-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .task-item {
            padding: 12px 14px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .task-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .task-item.active {
            border-color: #667eea;
            background: #f0f2ff;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
        }

        .task-id {
            font-family: monospace;
            font-size: 12px;
            color: #667eea;
            font-weight: 500;
            word-break: break-all;
            margin-bottom: 4px;
        }

        .task-meta {
            font-size: 11px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-status {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #e0e0e0;
        }

        .task-status.has-info {
            background: #27ae60;
        }

        .task-image-name {
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .task-page-tag {
            display: inline-block;
            margin-left: 6px;
            padding: 0 5px;
            font-size: 10px;
            line-height: 1.6;
            border-radius: 8px;
            background: #eef1f6;
            color: #4a5568;
            font-weight: 500;
            vertical-align: middle;
        }

        .badge {
            flex-shrink: 0;
            margin-left: 6px;
            padding: 1px 6px;
            font-size: 10px;
            line-height: 1.5;
            border-radius: 10px;
            font-weight: 500;
            white-space: nowrap;
        }

        .badge-badcase {
            background: #fff1f0;
            color: #d4380d;
            border: 1px solid #ffccc7;
        }

        .badge-clean {
            background: #f6ffed;
            color: #389e0d;
            border: 1px solid #b7eb8f;
        }

        /* 中间图片区域 */
        .image-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e8e8e8;
            overflow: hidden;
        }

        .image-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
            padding: 20px;
        }

        .image-wrapper.fit-width {
            align-items: flex-start;
            justify-content: flex-start;
        }

        .image-box {
            position: relative;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            border-radius: 4px;
            overflow: hidden;
            background: white;
            max-width: 100%;
        }

        .image-box.fit-width {
            width: 100%;
            max-width: none;
            border-radius: 0;
        }

        .image-box img {
            display: block;
            max-width: 100%;
            max-height: calc(100vh - 100px);
            object-fit: contain;
        }

        .image-box.fit-width img {
            width: 100%;
            height: auto;
            max-height: none;
        }

        /* bbox overlay canvas: 内部分辨率 = naturalWidth/Height，
           CSS 100% 拉伸以匹配被缩放后的 <img>，否则 bbox 会错位 */
        .bbox-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: block;
        }

        .image-nav {
            position: fixed;
            right: 0;
            bottom: 20px;
            transform: translateX(0);
            background: white;
            border-radius: 8px 0 0 8px;
            box-shadow: -2px 0 12px rgba(0,0,0,0.08);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 10;
        }

        .image-nav-btn {
            width: 48px;
            height: 48px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .image-nav-btn:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .image-nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 浮动导航折叠 */
        .image-nav {
            transition: transform 0.25s ease, opacity 0.25s ease;
        }

        .image-nav.collapsed {
            transform: translateX(120%);
            opacity: 0;
            pointer-events: none;
        }

        .image-nav-divider {
            height: 1px;
            background: #e0e0e0;
            margin: 4px 0;
        }

        .image-nav-btn.small {
            width: 48px;
            height: 32px;
            font-size: 14px;
            color: #888;
        }

        .image-nav-handle {
            position: fixed;
            right: 0;
            bottom: 80px;
            width: 28px;
            height: 72px;
            background: white;
            border: 1px solid #e0e0e0;
            border-right: none;
            border-radius: 8px 0 0 8px;
            box-shadow: -2px 0 12px rgba(0,0,0,0.08);
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #667eea;
            font-size: 16px;
            z-index: 10;
            transition: all 0.2s;
        }

        .image-nav-handle:hover {
            background: #f8f9ff;
            color: #764ba2;
            width: 32px;
        }

        .image-nav-handle.show {
            display: flex;
        }

        /* 自动保存状态指示 */
        .auto-save-status {
            font-size: 11px;
            color: #888;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            min-width: 80px;
        }

        .auto-save-status.saving {
            color: #e67e22;
        }

        .auto-save-status.saved {
            color: #27ae60;
        }

        .auto-save-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            display: inline-block;
        }

        .auto-save-status.saving::before {
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 右侧信息面板 */
        .info-panel {
            width: 360px;
            background: white;
            border-left: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .info-panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            background: #fafbfc;
        }

        .info-panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-panel-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .info-panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .info-section {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .info-section-title {
            font-size: 12px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
        }

        .info-label {
            color: #888;
            flex-shrink: 0;
        }

        .info-value {
            color: #333;
            font-weight: 500;
            text-align: right;
            word-break: break-all;
        }

        .info-value.task-id-value {
            font-family: monospace;
            font-size: 12px;
            background: #f5f7ff;
            padding: 8px 12px;
            border-radius: 6px;
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .copy-btn {
            padding: 4px 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            opacity: 0.9;
        }

        .copy-btn.copied {
            background: #27ae60;
        }

        /* 错误列表 */
        .error-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .error-card {
            background: #f8f9fa;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 12px;
            position: relative;
        }

        .error-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .error-card-index {
            font-size: 12px;
            font-weight: 700;
            color: #888;
            background: white;
            border: 1px solid #ddd;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .error-type-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: white;
            flex: 1;
            text-align: center;
            margin: 0 8px;
        }

        .error-subtype-text {
            font-size: 12px;
            color: #666;
        }

        .error-comment {
            font-size: 13px;
            color: #333;
            line-height: 1.5;
            background: white;
            border-radius: 4px;
            padding: 8px 10px;
            margin-top: 6px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .error-bbox-info {
            font-size: 11px;
            color: #999;
            font-family: monospace;
            margin-top: 4px;
        }

        .error-bbox-info.empty {
            color: #e67e22;
            font-style: italic;
            font-family: inherit;
        }

        .error-delete-btn {
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
            line-height: 1;
        }

        .error-delete-btn:hover {
            color: #e74c3c;
        }

        /* 字段级编辑器 */
        .error-edit-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f8f9fa;
            border: 1px solid #667eea;
            border-radius: 8px;
            padding: 12px;
            position: relative;
        }

        .error-edit-row .row-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .error-edit-row .row-header .error-card-index {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .error-edit-row select,
        .error-edit-row input,
        .error-edit-row textarea {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            color: #333;
            background: white;
            outline: none;
            transition: border-color 0.15s;
        }

        .error-edit-row select:focus,
        .error-edit-row input:focus,
        .error-edit-row textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.12);
        }

        .error-edit-row textarea {
            min-height: 60px;
            resize: vertical;
            line-height: 1.5;
        }

        .error-edit-row .field-row {
            display: flex;
            gap: 6px;
        }

        .error-edit-row .field-row > * {
            flex: 1;
        }

        .error-edit-row .row-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #888;
        }

        .add-error-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: white;
            border: 1px dashed #667eea;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .add-error-btn:hover {
            background: #f0f2ff;
            border-style: solid;
        }

        .report-toolbar {
            display: flex;
            gap: 6px;
        }

        .report-btn {
            padding: 4px 10px;
            background: white;
            border: 1px solid #d0d0d0;
            color: #666;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            line-height: 1.4;
        }

        .report-btn:hover {
            border-color: #667eea;
            color: #667eea;
            background: #f8f9ff;
        }

        .report-btn.save-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }

        .report-btn.save-btn:hover {
            opacity: 0.9;
            color: white;
        }

        .report-btn.cancel-btn:hover {
            border-color: #e74c3c;
            color: #e74c3c;
            background: #fff5f5;
        }

        .report-title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .badcase-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            font-size: 16px;
            font-weight: 700;
        }

        .badcase-badge.zero {
            background: #95a5a6;
        }

        .jchip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .jchip {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            min-width: 32px;
            border: 1px solid #d9d9d9;
            background: white;
            color: #555;
            border-radius: 12px;
            font-size: 12px;
            font-family: monospace;
        }
        .jchip.correct {
            background: #f6ffed;
            color: #389e0d;
            border-color: #b7eb8f;
        }
        .jchip.wrong {
            background: #fff1f0;
            color: #d4380d;
            border-color: #ffccc7;
        }

        /* 缩略图预览 */
        .thumb-preview {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            background: #f0f0f0;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumb-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* schema 来源标记 */
        .source-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .source-tag.v2 {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .source-tag.legacy {
            background: #fff3e0;
            color: #e65100;
        }

        /* 隐藏文件输入 */
        #folderInput {
            display: none;
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 2000;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 14px;
        }

        /* 提示信息 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #aaa;
        }
    </style>
</head>
<body>
    <input type="file" id="folderInput" webkitdirectory directory multiple>

    <!-- 顶部导航 -->
    <div class="header">
        <h1>📂 标注结果查看工具</h1>
        <div class="header-controls">
            <span class="total-badge" id="totalBadcaseInfo" style="display:none;"></span>
            <span class="stats-info" id="statsInfo">请选择标注结果文件夹</span>
            <button class="folder-select-btn" onclick="selectFolder()">📁 选择文件夹</button>
        </div>
    </div>

    <!-- 主体区域 -->
    <div class="main-container" id="mainContainer">
        <!-- 空状态 -->
        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">📂</div>
            <h2>欢迎使用标注结果查看工具</h2>
            <p>请选择一个由「图片批阅标注工具」导出的结果文件夹<br>新格式：&lt;task_id&gt;/annotations/default.json + source.&lt;ext&gt;<br>旧格式：&lt;task_id&gt;/(marked_*.jpg + error_info.txt)（自动兼容）</p>
            <button class="folder-select-btn" onclick="selectFolder()">选择标注结果文件夹</button>
        </div>

        <!-- 工作区 -->
        <div class="task-list" id="taskList" style="display:none;">
            <div class="task-list-header">
                <div class="task-list-title">任务列表</div>
                <div class="task-count" id="taskCount">0 个任务</div>
            </div>
            <div class="task-list-body" id="taskListBody">
                <!-- 动态生成 -->
            </div>
        </div>

        <div class="image-area" id="imageArea" style="display:none;">
            <div class="image-wrapper" id="imageWrapper">
                <div class="image-box" id="imageBox">
                    <img id="previewImage" src="" alt="原图" draggable="false">
                    <canvas id="bboxOverlay" class="bbox-overlay"></canvas>
                </div>
            </div>
        </div>

        <div class="info-panel" id="infoPanel" style="display:none;">
            <div class="info-panel-header">
                <div class="info-panel-title">任务详情</div>
            </div>
            <div class="info-panel-body" id="infoPanelBody">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 右侧浮动导航 -->
    <div class="image-nav" id="imageNav" style="display:none;">
        <button class="image-nav-btn" onclick="prevTask()" id="prevBtn" title="上一张">↑</button>
        <button class="image-nav-btn" onclick="toggleZoom()" id="zoomBtn" title="切换视图">🔍</button>
        <button class="image-nav-btn" onclick="nextTask()" id="nextBtn" title="下一张">↓</button>
        <div class="image-nav-divider"></div>
        <button class="image-nav-btn small" onclick="toggleImageNav()" title="隐藏导航">✕</button>
    </div>

    <!-- 折叠后的展开 handle -->
    <div class="image-nav-handle" id="imageNavHandle" onclick="toggleImageNav()" title="展开导航">◀</div>

    <!-- 提示信息 -->
    <div class="toast" id="toast"></div>

    <!-- 加载动画 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">正在加载...</div>
    </div>

    <script>
        // ============ 常量 ============
        const SCHEMA_VERSION = '1.0';
        const ANNOTATOR_ID = 'default';
        const STORAGE_PREFIX_V2 = 'gradingAnnotationV2:';
        const STORAGE_PREFIX_LEGACY = 'gradingReport:';
        const STORAGE_DEBOUNCE_MS = 400;

        // ============ taxonomy ============
        let taxonomy = null;
        function loadTaxonomy() {
            if (window.TAXONOMY && Array.isArray(window.TAXONOMY.categories)) {
                taxonomy = window.TAXONOMY;
                return;
            }
            taxonomy = {
                version: '1.0',
                categories: [
                    { id: 'topic', label: '切题', color: '#e74c3c', subtypes: [
                        { id: 'off_topic', label: '未切出此题' },
                        { id: 'incomplete', label: '切题不完整' },
                        { id: 'uncut_legend', label: '未切出图例' }
                    ]},
                    { id: 'ocr', label: 'OCR', color: '#3498db', subtypes: [
                        { id: 'char_wrong', label: '单字识别错' },
                        { id: 'char_missing', label: '漏字' },
                        { id: 'formula', label: '公式错' },
                        { id: 'format', label: '格式/标点' }
                    ]},
                    { id: 'solution', label: '解题', color: '#f39c12', subtypes: [
                        { id: 'logic', label: '逻辑错' },
                        { id: 'calc', label: '计算错' },
                        { id: 'formula', label: '公式错' },
                        { id: 'incomplete', label: '步骤缺失' }
                    ]},
                    { id: 'judgment', label: '判题', color: '#9b59b6', subtypes: [
                        { id: 'wrong_conclusion', label: '对错结论错' },
                        { id: 'score_wrong', label: '分数错' },
                        { id: 'overlook', label: '漏判' },
                        { id: 'label_wrong', label: '标签错误' }
                    ]}
                ],
                severity_levels: [1, 2, 3]
            };
            console.warn('taxonomy.js 加载失败，使用内置分类');
        }

        function getCategory(typeId) {
            return taxonomy.categories.find(c => c.id === typeId);
        }

        function getSubtypeLabel(typeId, subtypeId) {
            const cat = getCategory(typeId);
            if (!cat) return subtypeId || '-';
            const s = cat.subtypes.find(x => x.id === subtypeId);
            return s ? s.label : (subtypeId || '-');
        }

        function getCategoryColor(typeId) {
            const cat = getCategory(typeId);
            return cat ? cat.color : '#888';
        }

        function getCategoryLabel(typeId) {
            const cat = getCategory(typeId);
            return cat ? cat.label : typeId;
        }

        // 旧文本 reasons -> category id
        function mapReasonToCategoryId(reason) {
            const r = (reason || '').trim();
            if (r === '切题') return 'topic';
            if (r === 'OCR') return 'ocr';
            if (r === '解题') return 'solution';
            if (r === '判题') return 'judgment';
            // 模糊匹配
            if (r.includes('题') && !r.includes('解') && !r.includes('判')) return 'topic';
            if (r.toUpperCase().includes('OCR')) return 'ocr';
            if (r.includes('解')) return 'solution';
            if (r.includes('判')) return 'judgment';
            return null;
        }

        // ============ 全局状态 ============
        let resultItems = [];
        let currentIndex = 0;
        let zoomMode = 'fit-height';
        let autoSaveTimer = null;

        // ============ DOM 元素 ============
        const folderInput = document.getElementById('folderInput');
        const img = document.getElementById('previewImage');
        const bboxOverlay = document.getElementById('bboxOverlay');
        const bboxCtx = bboxOverlay.getContext('2d');

        // ============ 文件夹选择 ============
        function selectFolder() {
            folderInput.click();
        }

        folderInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            showLoading('正在扫描结果文件夹...');

            try {
                await parseResultFolder(files);
                if (resultItems.length === 0) {
                    showToast('未找到有效的标注结果，请检查文件夹结构');
                    hideLoading();
                    return;
                }

                initUI();
                loadTask(0);
                hideLoading();
                showToast(`已加载 ${resultItems.length} 个任务结果`);
            } catch (err) {
                console.error(err);
                showToast('加载失败: ' + err.message);
                hideLoading();
            }

            folderInput.value = '';
        });

        // ============ 解析结果文件夹（三路：paper.json + JSON + 旧 txt 回退） ============
        async function parseResultFolder(files) {
            resultItems = [];

            // 按一级子目录（task_id 文件夹）分组。
            // 三种格式：
            //   v3 卷级：<root>/<paper_id>/paper.json + <paper_id>/page_N/annotations/default.json + page_N/source.<ext>
            //   v2 单图：<root>/<task_id>/annotations/default.json + source.<ext>
            //   legacy：<root>/<task_id>/(marked_*.jpg + error_info.txt)
            const dirMap = {};
            for (const file of files) {
                const parts = file.webkitRelativePath.split('/');
                if (parts.length < 3) continue;

                const taskFolder = parts[1];
                if (!dirMap[taskFolder]) {
                    dirMap[taskFolder] = { files: [], folderName: taskFolder };
                }
                dirMap[taskFolder].files.push(file);
            }

            for (const key in dirMap) {
                const dir = dirMap[key];
                const paperJsonFile = dir.files.find(f => f.name === 'paper.json'
                    && f.webkitRelativePath.split('/').length === 3);
                if (paperJsonFile) {
                    // v3 卷级
                    const items = await parsePaperDir(paperJsonFile, dir);
                    resultItems.push(...items);
                } else {
                    // v2 单图 / legacy
                    const item = await parseDirToItem(dir);
                    if (item) resultItems.push(item);
                }
            }

            sortResultItemsByBadcase();
            applyLocalEdits();
        }

        // v3 卷级解析：每页一个 item，共享同一 paper 对象（questions + judgments）
        async function parsePaperDir(paperJsonFile, dir) {
            let paper;
            try {
                paper = JSON.parse(await readFileAsText(paperJsonFile));
            } catch (err) {
                console.warn('paper.json 解析失败:', err, dir.folderName);
                return [];
            }
            // 找所有 page_N 子目录的 default.json + source.<ext>
            // 每个文件路径形如：<root>/<paper_id>/page_N/annotations/default.json
            const pageMap = {};  // pageIdx(1-based) -> { jsonFile, sourceFile }
            for (const f of dir.files) {
                const m = f.webkitRelativePath.match(/\/page_(\d+)\/(.+)$/);
                if (!m) continue;
                const pageIdx = parseInt(m[1], 10);
                const tail = m[2];
                if (!pageMap[pageIdx]) pageMap[pageIdx] = {};
                if (tail === 'annotations/default.json') pageMap[pageIdx].jsonFile = f;
                else if (/^source\./i.test(tail) && isImageFile(tail)) pageMap[pageIdx].sourceFile = f;
                else if (tail.startsWith('marked_') && isImageFile(tail) && !pageMap[pageIdx].sourceFile) {
                    pageMap[pageIdx].sourceFile = f;
                }
            }

            // paper.judgments 可能是数组（来自导出）—— 转成对象引用方便共享
            const paperObj = {
                paper_id: paper.paper_id || dir.folderName,
                questions: Array.isArray(paper.questions) ? paper.questions : [],
                judgments: Array.isArray(paper.judgments) ? paper.judgments : [],
                identified_at: paper.identified_at || null,
                vlm_model_id: paper.vlm_model_id || null,
                image_count: paper.image_count || 0,
                images_meta: Array.isArray(paper.images) ? paper.images : []
            };

            const items = [];
            const pageIndices = Object.keys(pageMap).map(Number).sort((a, b) => a - b);
            for (const pageIdx of pageIndices) {
                const { jsonFile, sourceFile } = pageMap[pageIdx];
                if (!jsonFile) continue;
                let data;
                try {
                    data = JSON.parse(await readFileAsText(jsonFile));
                } catch (err) {
                    console.warn(`page_${pageIdx} default.json 解析失败:`, err);
                    continue;
                }
                const imageUrl = sourceFile ? URL.createObjectURL(sourceFile) : '';
                const taskId = (data.image && data.image.task_id) || paperObj.paper_id;
                const annotation = JSON.parse(JSON.stringify(data.annotation || { status: 'pending', errors: [] }));
                normalizeAnnotationStatus(annotation);
                items.push({
                    taskId,
                    paperId: (data.image && data.image.paper_id) || paperObj.paper_id,
                    pageIndex: (data.image && typeof data.image.page_index === 'number')
                        ? data.image.page_index
                        : pageIdx - 1,
                    paper: paperObj,
                    folderName: dir.folderName,
                    imageName: sourceFile ? sourceFile.name : '',
                    imageFile: sourceFile || null,
                    imageUrl,
                    schemaVersion: data.schema_version || '1.0',
                    source: 'v3',
                    annotation
                });
            }
            // 若 pageMap 为空（只有 paper.json），至少给一个占位 item 以便用户看到卷信息
            if (items.length === 0) {
                items.push({
                    taskId: paperObj.paper_id,
                    paperId: paperObj.paper_id,
                    pageIndex: 0,
                    paper: paperObj,
                    folderName: dir.folderName,
                    imageName: '',
                    imageFile: null,
                    imageUrl: '',
                    schemaVersion: '1.0',
                    source: 'v3',
                    annotation: { status: 'no_badcase', errors: [] }
                });
            }
            return items;
        }

        // 排序：有 badcase 优先，无 badcase 次之；组内保留原顺序（Array.prototype.sort 在主流引擎稳定）
        function sortResultItemsByBadcase() {
            resultItems.sort((a, b) => {
                const aHas = (a.annotation?.errors?.length ?? 0) > 0 ? 1 : 0;
                const bHas = (b.annotation?.errors?.length ?? 0) > 0 ? 1 : 0;
                return bHas - aHas;
            });
        }

        async function parseDirToItem(dir) {
            // 新格式优先
            const jsonFile = dir.files.find(f => f.name === 'default.json' && f.webkitRelativePath.includes('/annotations/'));
            if (jsonFile) {
                try {
                    const text = await readFileAsText(jsonFile);
                    const data = JSON.parse(text);
                    return await buildItemFromV2Json(data, dir);
                } catch (err) {
                    console.warn('JSON 解析失败，回退到旧格式:', err, dir.folderName);
                }
            }

            // 旧格式回退
            const imageFile = dir.files.find(f =>
                (f.name.startsWith('marked_') || f.name.startsWith('source.')) && isImageFile(f.name)
            );
            const errorInfoFile = dir.files.find(f => f.name === 'error_info.txt');
            const taskIdFile = dir.files.find(f => f.name === 'task_id.txt');

            if (!imageFile) return null;

            let legacyInfo = {};
            if (errorInfoFile) {
                const text = await readFileAsText(errorInfoFile);
                legacyInfo = parseErrorInfo(text);
                legacyInfo._raw = text;
            }

            let taskId = legacyInfo.taskId || dir.folderName;
            if (taskIdFile && !legacyInfo.taskId) {
                taskId = (await readFileAsText(taskIdFile)).trim();
            }

            const imageUrl = URL.createObjectURL(imageFile);
            return buildItemFromLegacy(taskId, dir.folderName, imageFile, imageUrl, legacyInfo);
        }

        async function buildItemFromV2Json(data, dir) {
            // 定位 source.<ext>
            const sourceFile = dir.files.find(f => /^source\./i.test(f.name) && isImageFile(f.name));
            // 没有就找 marked_*.jpg 旧图
            const fallbackImage = sourceFile || dir.files.find(f => f.name.startsWith('marked_') && isImageFile(f.name));
            const imageUrl = fallbackImage ? URL.createObjectURL(fallbackImage) : '';
            const taskId = (data.image && data.image.task_id) || dir.folderName;

            // 深拷贝 annotation，保持后续编辑不影响原始数据
            const annotation = JSON.parse(JSON.stringify(data.annotation || { status: 'pending', errors: [] }));
            normalizeAnnotationStatus(annotation);

            return {
                taskId,
                folderName: dir.folderName,
                imageName: fallbackImage ? fallbackImage.name : '',
                imageFile: fallbackImage || null,
                imageUrl,
                schemaVersion: data.schema_version || '1.0',
                source: 'v2',
                annotation
            };
        }

        function buildItemFromLegacy(taskId, folderName, imageFile, imageUrl, legacyInfo) {
            const reasons = legacyInfo.reasons || [];
            // 把 reasons 映射为 errors（bbox 信息丢失）
            const errors = reasons.map((r, i) => {
                const typeId = mapReasonToCategoryId(r);
                return {
                    error_id: `legacy_${String(i + 1).padStart(2, '0')}`,
                    error_type: typeId || 'topic',
                    error_subtype: null,
                    severity: null,
                    comment: `（历史数据，位置信息未保留，迁移自 error_info.txt）`,
                    marks: [{
                        mark_id: `legacy_m_${i + 1}`,
                        role: 'primary',
                        type: 'bbox',
                        geometry: { bbox: null, points: null },
                        color: getCategoryColor(typeId || 'topic'),
                        width: 2
                    }],
                    annotator_id: 'legacy',
                    created_at: legacyInfo.timestamp || null,
                    updated_at: legacyInfo.timestamp || null,
                    duration_ms: null
                };
            });

            return {
                taskId,
                folderName,
                imageName: imageFile.name,
                imageFile,
                imageUrl,
                schemaVersion: 'legacy',
                source: 'legacy',
                annotation: {
                    status: errors.length > 0 ? 'annotated' : 'no_badcase',
                    errors,
                    session_id: null,
                    annotator_id: 'legacy',
                    started_at: legacyInfo.timestamp || null,
                    saved_at: legacyInfo.timestamp || null,
                    _legacy: {
                        folderPath: legacyInfo.folderPath,
                        timestamp: legacyInfo.timestamp,
                        hasDrawing: legacyInfo.hasDrawing,
                        badcaseCount: legacyInfo.badcaseCount,
                        reasons: legacyInfo.reasons
                    }
                }
            };
        }

        // 把 skipped/pending/异常状态统一到 annotated | no_badcase 两种语义，
        // 让下游排序与徽章只需看一种 status。
        function normalizeAnnotationStatus(annotation) {
            if (!annotation) return;
            const hasErrors = Array.isArray(annotation.errors) && annotation.errors.length > 0;
            if (hasErrors) {
                annotation.status = 'annotated';
            } else if (annotation.status !== 'annotated') {
                annotation.status = 'no_badcase';
            }
        }

        function isImageFile(name) {
            const ext = name.toLowerCase();
            return ext.endsWith('.jpg') || ext.endsWith('.jpeg') || ext.endsWith('.png') || ext.endsWith('.gif') || ext.endsWith('.webp') || ext.endsWith('.bmp');
        }

        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = reject;
                reader.readAsText(file);
            });
        }

        function parseErrorInfo(text) {
            const info = {};
            const lines = text.split('\n');

            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed || trimmed.startsWith('---')) continue;

                const colonIndex = trimmed.indexOf(':');
                if (colonIndex > 0) {
                    const key = trimmed.substring(0, colonIndex).trim();
                    const value = trimmed.substring(colonIndex + 1).trim();

                    switch(key) {
                        case '任务编号': info.taskId = value; break;
                        case '文件夹': info.folderPath = value; break;
                        case '图片名称': info.imageName = value; break;
                        case '标注时间': info.timestamp = value; break;
                        case 'Badcase 数量': info.badcaseCount = parseInt(value) || 0; break;
                        case '错误原因': info.reasons = value.split(',').map(r => r.trim()).filter(r => r); break;
                        case '是否有勾画痕迹': info.hasDrawing = value === '是'; break;
                    }
                }
            }

            if (!info.reasons || info.reasons.length === 0) {
                const reasonMatch = text.match(/错误原因:\s*(.+)/);
                if (reasonMatch) {
                    info.reasons = reasonMatch[1].split(',').map(r => r.trim()).filter(r => r);
                }
            }

            return info;
        }

        // ============ UI 初始化 ============
        function initUI() {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('taskList').style.display = 'flex';
            document.getElementById('imageArea').style.display = 'flex';
            document.getElementById('infoPanel').style.display = 'flex';
            document.getElementById('imageNav').style.display = 'flex';
            renderTaskList();
            updateTotalBadcase();
        }

        // ============ 统计 Badcase 总数 ============
        function updateTotalBadcase() {
            let total = 0;
            let tasksWithBadcase = 0;
            let tasksNoBadcase = 0;
            for (const item of resultItems) {
                const c = (item.annotation && item.annotation.errors || []).length;
                total += c;
                if (c > 0) tasksWithBadcase++;
                else tasksNoBadcase++;
            }
            const el = document.getElementById('totalBadcaseInfo');
            el.innerHTML = `共 <span class="total-num">${total}</span> 个错误 · ${tasksWithBadcase} 有 badcase / ${tasksNoBadcase} 无 badcase · ${resultItems.length} 任务`;
            el.style.display = 'inline-flex';
        }

        // ============ 渲染任务列表 ============
        function renderTaskList() {
            const body = document.getElementById('taskListBody');
            body.innerHTML = '';

            document.getElementById('taskCount').textContent = `${resultItems.length} 个任务`;

            resultItems.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'task-item' + (i === currentIndex ? ' active' : '');
                div.onclick = () => loadTask(i);

                const errorCount = (item.annotation && item.annotation.errors || []).length;
                const hasInfo = errorCount > 0;
                const badgeHtml = hasInfo
                    ? `<span class="badge badge-badcase">${errorCount} 个错误</span>`
                    : `<span class="badge badge-clean">无 badcase</span>`;

                // 多页卷：显示 page N/M 区分同卷不同页
                let pageTag = '';
                if (item.paper && item.paper.image_count > 1) {
                    pageTag = ` <span class="task-page-tag">P${(item.pageIndex ?? 0) + 1}/${item.paper.image_count}</span>`;
                }

                div.innerHTML = `
                    <div class="task-id">${escapeHtml(item.taskId)}${pageTag}</div>
                    <div class="task-meta">
                        <span class="task-image-name">${escapeHtml(item.imageName || '-')}</span>
                        ${badgeHtml}
                    </div>
                `;
                body.appendChild(div);
            });
        }

        function updateTaskListActive(index) {
            document.querySelectorAll('.task-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
            const activeEl = document.querySelectorAll('.task-item')[index];
            if (activeEl) {
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // ============ 加载任务 ============
        function loadTask(index) {
            if (index < 0 || index >= resultItems.length) return;

            // 切换前清理编辑器：落盘最后一次输入、清除定时器
            flushPendingEdit();
            clearTimeout(autoSaveTimer);

            currentIndex = index;
            const item = resultItems[index];

            document.getElementById('statsInfo').textContent = `结果 ${index + 1} / ${resultItems.length}`;

            // 加载图片 + 等加载完再画 bbox
            if (item.imageUrl) {
                renderBBoxOverlay(null);
                img.onload = () => {
                    syncOverlaySize();
                    renderBBoxOverlay(item);
                };
                img.src = item.imageUrl;
            } else {
                img.removeAttribute('src');
                renderBBoxOverlay(null);
            }

            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === resultItems.length - 1;

            updateTaskListActive(index);
            renderInfoPanel(item);
        }

        // ============ bbox overlay ============
        function syncOverlaySize() {
            const w = img.naturalWidth || img.clientWidth || 1;
            const h = img.naturalHeight || img.clientHeight || 1;
            bboxOverlay.width = w;
            bboxOverlay.height = h;
        }

        function renderBBoxOverlay(item) {
            bboxCtx.clearRect(0, 0, bboxOverlay.width, bboxOverlay.height);
            if (!item || !item.annotation || !item.annotation.errors) return;

            const errors = item.annotation.errors;
            errors.forEach((err, i) => {
                const mark = err.marks && err.marks.find(m => m.role === 'primary');
                if (!mark || !mark.geometry || !mark.geometry.bbox) return;
                const [x, y, w, h] = mark.geometry.bbox;
                if (w <= 0 || h <= 0) return;

                const color = mark.color || getCategoryColor(err.error_type) || '#e74c3c';
                bboxCtx.lineWidth = Math.max(2, (bboxOverlay.width || 800) / 400);
                bboxCtx.strokeStyle = color;
                bboxCtx.strokeRect(x, y, w, h);

                // 半透明填充
                bboxCtx.fillStyle = hexToRgba(color, 0.12);
                bboxCtx.fillRect(x, y, w, h);

                // 角标
                const fontSize = Math.max(12, Math.round((bboxOverlay.width || 800) / 50));
                bboxCtx.font = `bold ${fontSize}px -apple-system, sans-serif`;
                const label = String(i + 1);
                const padding = fontSize * 0.4;
                const textW = bboxCtx.measureText(label).width + padding * 2;
                const textH = fontSize + padding;
                bboxCtx.fillStyle = color;
                bboxCtx.fillRect(x, y, textW, textH);
                bboxCtx.fillStyle = '#fff';
                bboxCtx.textBaseline = 'top';
                bboxCtx.fillText(label, x + padding, y + padding * 0.5);
            });
        }

        function hexToRgba(hex, alpha) {
            const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex || '');
            if (!m) return `rgba(231,76,60,${alpha})`;
            return `rgba(${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)},${alpha})`;
        }

        // ============ 渲染信息面板 ============
        function renderInfoPanel(item) {
            const body = document.getElementById('infoPanelBody');
            const ann = item.annotation || (item.annotation = { status: 'no_badcase', errors: [] });
            const errors = ann.errors || (ann.errors = []);

                ? '<span class="source-tag legacy">legacy txt</span>'
                : '<span class="source-tag v2">v2 json</span>';

            const startedAt = ann.started_at || legacy.timestamp || '-';
            const folderPath = legacy.folderPath || (item.imageName ? item.folderName : '-');

            body.innerHTML = `
                <div class="info-section">
                    <div class="info-section-title">任务编号 ${sourceTag}</div>
                    <div class="info-value task-id-value">
                        <span>${escapeHtml(item.taskId)}</span>
                        <button class="copy-btn" onclick="copyTaskId(this, '${escapeHtml(item.taskId)}')">复制</button>
                    </div>
                </div>

                <div class="info-section">
                    <div class="info-section-title">错误数量</div>
                    <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
                        <span class="badcase-badge ${errorCount > 0 ? '' : 'zero'}">${errorCount}</span>

                    </div>
                </div>

                ${renderJudgmentsCard(item.paper && item.paper.judgments)}

                <div class="info-section">
                    <div class="info-section-title">详细信息</div>

                        <span class="info-label">图片名称</span>
                        <span class="info-value">${escapeHtml(item.imageName || '-')}</span>
                    </div>

                        <span class="info-label">标注时间</span>
                        <span class="info-value">${escapeHtml(startedAt)}</span>

                <div class="info-section">
                    <div class="info-section-title report-title-bar">

                        <div class="report-toolbar">
                            <span class="auto-save-status" id="autoSaveStatus" style="display:none;">已自动保存</span>
                            <button class="report-btn" id="editReportBtn" onclick="enterEditMode()">✏️ 编辑</button>
                            <button class="report-btn save-btn" id="downloadReportBtn" onclick="downloadReport()" title="下载 default.json">💾 下载</button>
                            <button class="report-btn" id="finishReportBtn" onclick="exitEditMode()" style="display:none;">✅ 完成</button>

        // 只读模式：judgments（题号判题）卡片
        function renderJudgmentsCard(judgments) {
            if (!Array.isArray(judgments) || judgments.length === 0) return '';
            const valid = judgments.filter(j => j && j.question_no);
            if (valid.length === 0) return '';
            const correct = valid.filter(j => j.status === 'correct').length;
            const wrong = valid.filter(j => j.status === 'wrong').length;
            const unmarked = valid.length - correct - wrong;
            const chips = valid.map(j => {
                const st = j.status || 'unmarked';
                const cls = st === 'correct' ? 'jchip correct' : (st === 'wrong' ? 'jchip wrong' : 'jchip');
                return `<span class="${cls}" title="${escapeHtml(st)}">${escapeHtml(j.question_no)}</span>`;
            }).join('');
            return `
                <div class="info-section">
                    <div class="info-section-title">题号判题</div>
                    <div style="font-size:12px;color:#888;margin-top:6px;">共 ${valid.length} 题 · 对 ${correct} · 错 ${wrong} · 未判 ${unmarked}</div>
                    <div class="jchip-row">${chips}</div>
                </div>
            `;
        }

        // 只读模式：错误列表
        function renderErrorListView(errors) {
            if (!errors || errors.length === 0) {
                return '<div style="color:#999;font-size:13px;padding:8px 0;">无错误记录（点击「编辑」可添加）</div>';
            }
            const html = errors.map((err, i) => {
                const color = getCategoryColor(err.error_type);
                const typeLabel = getCategoryLabel(err.error_type);
                const subtypeLabel = err.error_subtype ? getSubtypeLabel(err.error_type, err.error_subtype) : '';
                const mark = err.marks && err.marks.find(m => m.role === 'primary');
                const bbox = mark && mark.geometry && mark.geometry.bbox;
                const bboxInfo = bbox
                    ? `<div class="error-bbox-info">bbox: [${bbox.map(v => Math.round(v)).join(', ')}]</div>`
                    : `<div class="error-bbox-info empty">位置信息缺失（历史数据）</div>`;
                return `
                    <div class="error-card">
                        <div class="error-card-header">
                            <span class="error-card-index">${i + 1}</span>
                            <span class="error-type-badge" style="background:${color};">${escapeHtml(typeLabel)}${subtypeLabel ? ' · ' + escapeHtml(subtypeLabel) : ''}</span>
                        </div>
                        <div class="error-comment">${escapeHtml(err.comment || '')}</div>
                        ${bboxInfo}
                    </div>
                `;
            }).join('');
            return `<div class="error-list">${html}</div>`;
        }

        // 编辑模式：字段级编辑器
        function renderErrorEditView(errors) {
            const rows = errors.map((err, i) => renderErrorEditRow(err, i)).join('');
            return `
                <div class="error-list" id="errorEditList">${rows}</div>
                <button class="add-error-btn" onclick="addNewError()">+ 添加错误</button>
                <div style="font-size:11px;color:#999;margin-top:8px;line-height:1.5;">
                    修改会<span style="color:#e67e22;">实时自动保存</span>到当前会话和浏览器本地。点击「💾 下载」可生成新的 <code>annotation.json</code>。
                </div>
            `;
        }

        function renderErrorEditRow(err, i) {
            const color = getCategoryColor(err.error_type);
            const typeLabel = getCategoryLabel(err.error_type);
            const subtypeLabel = err.error_subtype || '';

            const typeOptions = taxonomy.categories.map(c =>
                `<option value="${c.id}" ${c.id === err.error_type ? 'selected' : ''}>${escapeHtml(c.label)}</option>`
            ).join('');

            const cat = getCategory(err.error_type);
            const subtypeOptions = cat
                ? cat.subtypes.map(s =>
                    `<option value="${s.id}" ${s.id === subtypeLabel ? 'selected' : ''}>${escapeHtml(s.label)}</option>`
                ).join('')
                : '';

            const mark = err.marks && err.marks.find(m => m.role === 'primary');
            const bbox = mark && mark.geometry && mark.geometry.bbox;
            const bboxText = bbox ? `[${bbox.map(v => Math.round(v)).join(', ')}]` : '位置信息缺失（历史数据，无法编辑）';

            return `
                <div class="error-edit-row" data-error-id="${escapeHtml(err.error_id)}">
                    <div class="row-header">
                        <span class="error-card-index">${i + 1}</span>
                        <span class="error-type-badge" style="background:${color};">${escapeHtml(typeLabel)}</span>
                        <button class="error-delete-btn" onclick="deleteError('${escapeHtml(err.error_id)}')" title="删除">✕</button>
                    </div>
                    <div class="field-row">
                        <select data-field="error_type" onchange="updateErrorField('${escapeHtml(err.error_id)}', 'error_type', this.value)">
                            ${typeOptions}
                        </select>
                        <select data-field="error_subtype" onchange="updateErrorField('${escapeHtml(err.error_id)}', 'error_subtype', this.value)">
                                <option value="" ${!subtypeLabel ? 'selected' : ''}>无子类型</option>
                                ${subtypeOptions}
                        </select>
                    </div>
                    <textarea data-field="comment" oninput="updateErrorField('${escapeHtml(err.error_id)}', 'comment', this.value)" placeholder="错误说明...">${escapeHtml(err.comment || '')}</textarea>
                    <div class="row-footer">
                        <span style="font-family:monospace;">bbox: ${escapeHtml(bboxText)}</span>
                    </div>
                </div>
            `;
        }

        // ============ 编辑模式 ============
        let editModeActive = false;

        function enterEditMode() {
            const item = resultItems[currentIndex];
            if (!item) return;

            editModeActive = true;
            document.getElementById('editReportBtn').style.display = 'none';
            document.getElementById('finishReportBtn').style.display = 'inline-block';
            document.getElementById('errorListView').style.display = 'none';
            document.getElementById('errorEditView').style.display = 'block';

            renderErrorEditViewInner(item);
            setAutoSaveStatus('idle');
        }

        function renderErrorEditViewInner(item) {
            const wrap = document.getElementById('errorEditView');
            wrap.innerHTML = renderErrorEditView(item.annotation.errors);
        }

        function exitEditMode() {
            editModeActive = false;
            flushPendingEdit();
            clearTimeout(autoSaveTimer);

            document.getElementById('editReportBtn').style.display = 'inline-block';
            document.getElementById('finishReportBtn').style.display = 'none';
            document.getElementById('errorListView').style.display = 'block';
            document.getElementById('errorEditView').style.display = 'none';
            document.getElementById('errorEditView').innerHTML = '';

            const item = resultItems[currentIndex];
            if (item) {
                renderInfoPanel(item);
                renderBBoxOverlay(item);
                renderTaskList();
                updateTaskListActive(currentIndex);
                updateTotalBadcase();
            }
        }

        function updateErrorField(errorId, field, value) {
            const item = resultItems[currentIndex];
            if (!item) return;
            const err = item.annotation.errors.find(e => e.error_id === errorId);
            if (!err) return;

            if (field === 'error_type') {
                err.error_type = value;
                // 类型变化时清空 subtype，并刷新该行的子类型下拉与颜色
                err.error_subtype = null;
                const mark = err.marks && err.marks.find(m => m.role === 'primary');
                if (mark) mark.color = getCategoryColor(value);
                renderErrorEditViewInner(item);
                renderBBoxOverlay(item);
            } else if (field === 'error_subtype') {
                err.error_subtype = value || null;
            } else if (field === 'comment') {
                err.comment = value;
            }

            scheduleAutoSave(item);
        }

        function addNewError() {
            const item = resultItems[currentIndex];
            if (!item) return;
            const newId = 'err_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
            const newError = {
                error_id: newId,
                error_type: taxonomy.categories[0].id,
                error_subtype: null,
                severity: null,
                comment: '',
                // viewer 无法画 bbox，新建的错误是纯文本说明（note 角色，无 geometry）
                marks: [],
                annotator_id: ANNOTATOR_ID,
                created_at: new Date().toISOString(),
                updated_at: new Date().toISOString(),
                duration_ms: null
            };
            item.annotation.errors.push(newError);
            if (item.annotation.status !== 'annotated') item.annotation.status = 'annotated';
            renderErrorEditViewInner(item);
            renderTaskList();
            updateTotalBadcase();
            renderBBoxOverlay(item);
            scheduleAutoSave(item);
        }

        function deleteError(errorId) {
            const item = resultItems[currentIndex];
            if (!item) return;
            item.annotation.errors = item.annotation.errors.filter(e => e.error_id !== errorId);
            if (item.annotation.errors.length === 0) item.annotation.status = 'no_badcase';
            renderErrorEditViewInner(item);
            renderTaskList();
            updateTotalBadcase();
            renderBBoxOverlay(item);
            scheduleAutoSave(item);
        }

        function scheduleAutoSave(item) {
            setAutoSaveStatus('saving');
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                // 更新 saved_at 以便下次加载时 freshness 检查能识别新版本
                item.annotation.saved_at = new Date().toISOString();
                saveLocalEdit(item.taskId, item.annotation);
                setAutoSaveStatus('saved');
            }, STORAGE_DEBOUNCE_MS);
        }

        function flushPendingEdit() {
            // 切换任务/退出编辑前调用：把内存中的当前 annotation 落盘
            if (autoSaveTimer) {
                clearTimeout(autoSaveTimer);
                autoSaveTimer = null;
                const item = resultItems[currentIndex];
                if (item) {
                    saveLocalEdit(item.taskId, item.annotation);
                }
            }
        }

        function setAutoSaveStatus(state) {
            const el = document.getElementById('autoSaveStatus');
            if (!el) return;
            el.classList.remove('saving', 'saved');
            if (state === 'saving') {
                el.style.display = 'inline-flex';
                el.textContent = '编辑中...';
                el.classList.add('saving');
            } else if (state === 'saved') {
                el.style.display = 'inline-flex';
                const now = new Date();
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                const ss = String(now.getSeconds()).padStart(2, '0');
                el.textContent = `✓ 已自动保存 ${hh}:${mm}:${ss}`;
                el.classList.add('saved');
            } else {
                el.style.display = 'none';
            }
        }

        // ============ 下载 annotation.json ============
        async function downloadReport() {
            const item = resultItems[currentIndex];
            if (!item) return;
            // 先把内存里的最新状态落盘
            flushPendingEdit();

            const payload = serializeAnnotationForExport(item);
            const text = JSON.stringify(payload, null, 2);

            const result = await writeAnnotationJsonFile(text, item);
            if (result === 'file') {
                showToast('✓ default.json 已写入文件');
            } else if (result === 'download') {
                showToast('✓ 已下载 default.json，请替换原文件');
            }
        }

        function serializeAnnotationForExport(item) {
            // v2+ schema：image.paper_id + page_index 加在 image 段，judgments 不再写在 image-level annotation 里
            const ann = item.annotation;
            const baseImage = {
                task_id: item.taskId,
                paper_id: item.paperId || item.taskId,
                page_index: item.pageIndex ?? 0,
                source_path: item.imageName ? `${item.folderName}/${item.imageName}` : item.folderName,
                source_hash: null,
                width: img.naturalWidth || null,
                height: img.naturalHeight || null,
                metadata: { task_ids: [item.taskId] }
            };

            return {
                schema_version: SCHEMA_VERSION,
                image: baseImage,
                annotation: {
                    status: ann.status || (ann.errors.length > 0 ? 'annotated' : 'no_badcase'),
                    errors: ann.errors.map(e => ({
                        error_id: e.error_id,
                        error_type: e.error_type,
                        error_subtype: e.error_subtype || null,
                        severity: e.severity || null,
                        comment: e.comment || '',
                        marks: (e.marks || []).map(m => ({
                            mark_id: m.mark_id,
                            role: m.role,
                            type: m.type,
                            geometry: { bbox: m.geometry ? m.geometry.bbox : null, points: m.geometry ? m.geometry.points : null },
                            color: m.color || getCategoryColor(e.error_type),
                            width: m.width || 2
                        })),
                        annotator_id: e.annotator_id || ANNOTATOR_ID,
                        created_at: e.created_at || null,
                        updated_at: e.updated_at || new Date().toISOString(),
                        duration_ms: e.duration_ms || null
                    })),
                    session_id: ann.session_id || null,
                    annotator_id: ann.annotator_id || ANNOTATOR_ID,
                    started_at: ann.started_at || null,
                    saved_at: new Date().toISOString(),
                    total_duration_ms: ann.total_duration_ms || 0,
                    client: { tool_version: 'viewer-2.0.0', browser: navigator.userAgent }
                }
            };
        }

        async function writeAnnotationJsonFile(text, item) {
            if (window.showSaveFilePicker) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: 'default.json',
                        types: [{
                            description: 'JSON 文件',
                            accept: { 'application/json': ['.json'] }
                        }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(text);
                    await writable.close();
                    return 'file';
                } catch (err) {
                    if (err && err.name === 'AbortError') return 'cancelled';
                    console.warn('showSaveFilePicker 失败，回退到下载:', err);
                }
            }
            downloadJson(text);
            return 'download';
        }

        function downloadJson(text) {
            const blob = new Blob([text], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'default.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 200);
        }

        // ============ 本地存储（跨会话持久化） ============
        function localEditKey(taskId) {
            return STORAGE_PREFIX_V2 + taskId;
        }

        function legacyLocalEditKey(taskId) {
            return STORAGE_PREFIX_LEGACY + taskId;
        }

        function saveLocalEdit(taskId, annotation) {
            try {
                localStorage.setItem(localEditKey(taskId), JSON.stringify(annotation));
            } catch (err) {
                console.warn('localStorage 写入失败:', err);
            }
        }

        function getLocalEdit(taskId) {
            try {
                const raw = localStorage.getItem(localEditKey(taskId));
                if (raw) return { kind: 'v2', data: JSON.parse(raw) };
                // 一次性迁移旧 key
                const legacyRaw = localStorage.getItem(legacyLocalEditKey(taskId));
                if (legacyRaw) {
                    // 旧数据是 raw 文本，做尽力解析
                    const info = parseErrorInfo(legacyRaw);
                    const migrated = migrateLegacyTextToAnnotation(info, legacyRaw);
                    localStorage.setItem(localEditKey(taskId), JSON.stringify(migrated));
                    localStorage.removeItem(legacyLocalEditKey(taskId));
                    return { kind: 'legacy', data: migrated };
                }
                return null;
            } catch (err) {
                return null;
            }
        }

        function migrateLegacyTextToAnnotation(info, rawText) {
            const reasons = info.reasons || [];
            const errors = reasons.map((r, i) => {
                const typeId = mapReasonToCategoryId(r);
                return {
                    error_id: `legacy_${String(i + 1).padStart(2, '0')}`,
                    error_type: typeId || 'topic',
                    error_subtype: null,
                    severity: null,
                    comment: '（历史数据，位置信息未保留，迁移自 error_info.txt）',
                    marks: [{
                        mark_id: `legacy_m_${i + 1}`,
                        role: 'primary',
                        type: 'bbox',
                        geometry: { bbox: null, points: null },
                        color: getCategoryColor(typeId || 'topic'),
                        width: 2
                    }],
                    annotator_id: 'legacy',
                    created_at: info.timestamp || null,
                    updated_at: info.timestamp || null,
                    duration_ms: null
                };
            });
            return {
                status: errors.length > 0 ? 'annotated' : 'pending',
                errors,
                session_id: null,
                annotator_id: 'legacy',
                started_at: info.timestamp || null,
                saved_at: info.timestamp || null,
                _legacy: {
                    folderPath: info.folderPath,
                    timestamp: info.timestamp,
                    hasDrawing: info.hasDrawing,
                    badcaseCount: info.badcaseCount,
                    reasons: info.reasons
                }
            };
        }

        function applyLocalEdits() {
            // 仅当本地编辑严格新于文件 saved_at 时才覆盖，
            // 避免 localStorage 残留污染下一次加载的同 task_id 数据
            for (const item of resultItems) {
                const local = getLocalEdit(item.taskId);
                if (!local || !local.data) continue;
                const fileSavedAt = item.annotation && item.annotation.saved_at;
                const localSavedAt = local.data.saved_at;
                if (fileSavedAt && localSavedAt) {
                    if (new Date(localSavedAt).getTime() <= new Date(fileSavedAt).getTime()) {
                        continue;
                    }
                }
                // 保留文件的 _legacy 元信息（local 通常没有）
                if (item.annotation && item.annotation._legacy && !local.data._legacy) {
                    local.data._legacy = item.annotation._legacy;
                }
                item.annotation = local.data;
            }
        }

        function escapeHtml(text) {
            if (text === undefined || text === null || text === '') return '';
            const div = document.createElement('div');
            div.textContent = String(text);
            return div.innerHTML;
        }

        // ============ 浮动导航折叠 ============
        function toggleImageNav() {
            const nav = document.getElementById('imageNav');
            const handle = document.getElementById('imageNavHandle');
            if (!nav || !handle) return;
            const collapsed = nav.classList.toggle('collapsed');
            handle.classList.toggle('show', collapsed);
        }

        // ============ 复制任务ID ============
        function copyTaskId(btn, taskId) {
            navigator.clipboard.writeText(taskId).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '✓ 已复制';
                btn.classList.add('copied');
                showToast('任务ID已复制到剪贴板');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 1500);
            }).catch(() => {
                const originalText = btn.textContent;
                const textarea = document.createElement('textarea');
                textarea.value = taskId;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = '✓ 已复制';
                btn.classList.add('copied');
                showToast('任务ID已复制到剪贴板');
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copied');
                }, 1500);
            });
        }

        // ============ 导航 ============
        function prevTask() {
            if (currentIndex > 0) loadTask(currentIndex - 1);
        }

        function nextTask() {
            if (currentIndex < resultItems.length - 1) loadTask(currentIndex + 1);
        }

        // ============ 缩放 ============
        function toggleZoom() {
            zoomMode = zoomMode === 'fit-height' ? 'fit-width' : 'fit-height';
            applyZoom();
        }

        function applyZoom() {
            const box = document.getElementById('imageBox');
            const wrapper = document.getElementById('imageWrapper');

            if (zoomMode === 'fit-width') {
                box.classList.add('fit-width');
                wrapper.classList.add('fit-width');
            } else {
                box.classList.remove('fit-width');
                wrapper.classList.remove('fit-width');
            }
            // 切换后重新同步 overlay 尺寸（CSS 缩放变化但 canvas 内部分辨率不变）
            requestAnimationFrame(() => {
                syncOverlaySize();
                renderBBoxOverlay(resultItems[currentIndex]);
            });
        }

        // ============ 提示 ============
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }

        // ============ 键盘快捷键 ============
        document.addEventListener('keydown', (e) => {
            // 输入框中不触发导航
            const tag = (e.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

            switch(e.key) {
                case 'ArrowUp': prevTask(); break;
                case 'ArrowDown': nextTask(); break;
                case 'ArrowLeft': prevTask(); break;
                case 'ArrowRight': nextTask(); break;
            }
        });

        // ============ 窗口尺寸变化时重画 overlay ============
        window.addEventListener('resize', () => {
            if (!resultItems[currentIndex]) return;
            syncOverlaySize();
            renderBBoxOverlay(resultItems[currentIndex]);
        });

        // ============ 初始化 ============
        loadTaxonomy();
    </script>
</body>
</html>
